spring:
  application:
    name: pawhub-api
  # Local overrides: optional classpath file, plus optional secrets on disk (gitignored).
  config:
    import:
      - optional:classpath:application-local.yml
      - optional:file:config/application-secrets.yml
      - optional:file:backend/config/application-secrets.yml
  # Email: set MAIL_* env vars, OR use application-local.yml / application-secrets.yml (not committed).
  # If host is unset, verification links are logged instead of sent.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.ssl.trust: ${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
  datasource:
    url: jdbc:mysql://localhost:3306/pawhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: smab
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    ignore-migration-patterns: "*:missing"
    repair-on-migrate: true
    mixed: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

pawhub:
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:noreply@localhost}}
    from-name: ${MAIL_FROM_NAME:PawHub}
  auth:
    auto-verify-email-on-registration: ${PAWHUB_AUTO_VERIFY_EMAIL:true}
  admin:
    email: admin@pawhub.local
    password: admin123
    sync-credentials-on-startup: true
  demo-user:
    enabled: true
    email: demo@pawhub.local
    password: PawHub2026!
    display-name: Demo User
  frontend-base-url: "http://localhost:5173"
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-for-production-use-only}
    expiration-ms: 86400000
  upload-dir: ${user.dir}/uploads
  public-base-url: http://localhost:8080
  gemini:
    enabled: ${PAWHUB_GEMINI_ENABLED:${GEMINI_ENABLED:true}}
    api-key: ${PAWHUB_GEMINI_API_KEY:${GEMINI_API_KEY:}}
    fail-open-on-api-error: true

springdoc:
  swagger-ui:
    path: /swagger

logging:
  level:
    org.springframework.security: INFO
