spring:
  application:
    name: pawhub-api
  # Load optional local secrets (gitignored). See backend/config/application-secrets.yml.example
  config:
    import:
      - optional:file:config/application-secrets.yml
      - optional:file:backend/config/application-secrets.yml
  datasource:
    url: jdbc:mysql://localhost:3306/pawhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: smab
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    ignore-migration-patterns: "*:missing"   # ignore orphaned V3 from previous session
    repair-on-migrate: true                  # auto-repair on startup (clears failed V4 state)
    mixed: true                              # allow stored procedures in migration scripts
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

pawhub:
  admin:
    email: admin@pawhub.local
    password: admin123
    # Re-apply password + ADMIN role on startup (fixes login if this email was registered before as a normal user).
    sync-credentials-on-startup: true
  # Vite default; set to your deployed SPA origin in production (used in chat listing links).
  frontend-base-url: "http://localhost:5173"
  jwt:
    secret: "change-this-to-a-long-random-secret-key-for-production-use-only"
    expiration-ms: 86400000
  upload-dir: ${user.dir}/uploads
  public-base-url: http://localhost:8080
  gemini:
    enabled: true
    # Prefer backend/config/application-secrets.yml (gitignored) or env PAWHUB_GEMINI_API_KEY — never commit keys.
    api-key: ${PAWHUB_GEMINI_API_KEY:}
    # Model IDs default from com.pawhub.config.GeminiModelIds (gemini-3-flash + fallback). Override here or in application-secrets.yml if needed.
    # List models: GET https://generativelanguage.googleapis.com/v1beta/models?key=YOUR_KEY
    # While debugging: true = listings still work if the API errors. Set false when Cat-Check is stable.
    fail-open-on-api-error: true

springdoc:
  swagger-ui:
    path: /swagger

logging:
  level:
    org.springframework.security: INFO
