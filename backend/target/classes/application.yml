spring:
  application:
    name: pawhub-api
  # Optional local overrides (SMTP, API keys). File is gitignored — copy from application-local.yml.example
  config:
    import:
      - optional:classpath:application-local.yml
  # Email: set MAIL_* env vars, OR use application-local.yml (not committed).
  # If host is unset, verification links are logged instead of sent.
  #
  # Outlook / @outlook.com: if logs show 535 5.7.139 "SmtpClientAuthentication is disabled", Microsoft has turned
  # off basic SMTP for that mailbox—an app password will NOT fix it. Use Gmail + App Password for local dev, or
  # SendGrid/Mailgun, or have a Microsoft 365 admin enable "Authenticated SMTP" for the mailbox
  # (see https://aka.ms/smtp_auth_disabled).
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.ssl.trust: ${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
  datasource:
    url: jdbc:mysql://localhost:3306/pawhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    ignore-migration-patterns: "*:missing"
    repair-on-migrate: true
    mixed: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

pawhub:
  mail:
    # Shown as “From:” — set MAIL_FROM or it falls back to MAIL_USERNAME
    from: ${MAIL_FROM:${MAIL_USERNAME:noreply@localhost}}
    from-name: ${MAIL_FROM_NAME:PawHub}
  auth:
    auto-verify-email-on-registration: ${PAWHUB_AUTO_VERIFY_EMAIL:true}
  admin:
    email: admin@pawhub.local
    password: admin123
    sync-credentials-on-startup: true
  # Regular user created on first startup if the email is not already registered. Set enabled: false in production.
  demo-user:
    enabled: true
    email: demo@pawhub.local
    password: PawHub2026!
    display-name: Demo User
  frontend-base-url: "http://localhost:5173"
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-for-production-use-only}
    expiration-ms: 86400000
  upload-dir: ${user.dir}/uploads
  public-base-url: http://localhost:8080
  gemini:
    enabled: ${GEMINI_ENABLED:true}
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash
    fallback-model: gemini-3.1-flash-lite
    fail-open-on-api-error: true

springdoc:
  swagger-ui:
    path: /swagger

logging:
  level:
    org.springframework.security: INFO
