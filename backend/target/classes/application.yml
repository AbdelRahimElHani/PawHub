spring:
  application:
    name: pawhub-api
  # Local overrides: optional classpath file, plus optional secrets on disk (gitignored).
  config:
    import:
      - optional:classpath:application-local.yml
      - optional:file:config/application-secrets.yml
      - optional:file:backend/config/application-secrets.yml
  # Email: set MAIL_* env vars, OR use application-local.yml / application-secrets.yml (not committed).
  # If host is unset, verification links are logged instead of sent.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.ssl.trust: ${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
  # Local defaults when MYSQL* env vars are unset. Railway: set MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
  # Equivalent properties form: spring.datasource.url / username / password
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:pawhub}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:smab}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    ignore-migration-patterns: "*:missing"
    repair-on-migrate: true
    mixed: true
  servlet:
    multipart:
      # Room for large images / short videos; raise further if needed
      max-file-size: 50MB
      max-request-size: 55MB

server:
  # Cloud hosts (e.g. Railway) set PORT; local dev uses 8081.
  port: ${PORT:8081}

pawhub:
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:noreply@localhost}}
    from-name: ${MAIL_FROM_NAME:PawHub}
  auth:
    auto-verify-email-on-registration: ${PAWHUB_AUTO_VERIFY_EMAIL:true}
  admin:
    email: ${PAWHUB_ADMIN_EMAIL:admin@pawhub.local}
    password: ${PAWHUB_ADMIN_PASSWORD:admin123}
    # Production: set false after the admin password is set; set PAWHUB_ADMIN_PASSWORD to a strong value.
    sync-credentials-on-startup: ${PAWHUB_ADMIN_SYNC_CREDENTIALS_ON_STARTUP:true}
  demo-user:
    # Production: set PAWHUB_DEMO_USER_ENABLED=false
    enabled: ${PAWHUB_DEMO_USER_ENABLED:true}
    email: ${PAWHUB_DEMO_USER_EMAIL:demo@pawhub.local}
    password: ${PAWHUB_DEMO_USER_PASSWORD:PawHub2026!}
    display-name: ${PAWHUB_DEMO_USER_DISPLAY_NAME:Demo User}
  bootstrap:
    # Large demo dataset for Paw Market — disable in production (set false).
    paw-market-seed: ${PAWHUB_BOOTSTRAP_PAW_MARKET_SEED:true}
  frontend-base-url: ${PAWHUB_FRONTEND_BASE_URL:http://localhost:5173}
  # Comma-separated; use for custom domains or hosts not covered by built-in patterns (Vercel/Railway/etc.).
  cors-additional-allowed-patterns: ${PAWHUB_CORS_ADDITIONAL:}
  # Emergency only: allow any Origin for CORS + SockJS (set true to verify WS/CORS; do not leave on in production).
  cors-allow-all-origins: ${PAWHUB_CORS_ALLOW_ALL_ORIGINS:false}
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-for-production-use-only}
    expiration-ms: 86400000
  # Local: default under cwd. Railway: attach a Volume at /app/uploads and set PAWHUB_UPLOAD_DIR=/app/uploads
  upload-dir: ${PAWHUB_UPLOAD_DIR:${user.dir}/uploads}
  # Public origin of this API (no path, no trailing slash). Stored as {public-base-url}/api/files/{name}
  # In production: set PAWHUB_PUBLIC_BASE_URL=https://your-api.example.com
  # On Railway, if you omit it, RAILWAY_PUBLIC_DOMAIN is auto-applied at startup (see PublicBaseUrlFromRailwayRunner).
  public-base-url: ${PAWHUB_PUBLIC_BASE_URL:http://localhost:8081}
  gemini:
    enabled: ${PAWHUB_GEMINI_ENABLED:${GEMINI_ENABLED:true}}
    api-key: ${PAWHUB_GEMINI_API_KEY:${GEMINI_API_KEY:}}
    # Optional — leave blank to use defaults in com.pawhub.config.GeminiModelIds
    model: ${PAWHUB_GEMINI_MODEL:}
    fallback-model: ${PAWHUB_GEMINI_FALLBACK_MODEL:}
    whisker-model: ${PAWHUB_GEMINI_WHISKER_MODEL:}
    # Production: set PAWHUB_GEMINI_FAIL_OPEN_ON_API_ERROR=false once Gemini is verified
    fail-open-on-api-error: ${PAWHUB_GEMINI_FAIL_OPEN_ON_API_ERROR:true}

springdoc:
  swagger-ui:
    path: /swagger

logging:
  level:
    org.springframework.security: INFO
