spring:
  application:
    name: pawhub-api
  datasource:
    url: jdbc:mysql://localhost:3306/pawhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: smab
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    ignore-migration-patterns: "*:missing"   # ignore orphaned V3 from previous session
    repair-on-migrate: true                  # auto-repair on startup (clears failed V4 state)
    mixed: true                              # allow stored procedures in migration scripts
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

pawhub:
  # Vite default; set to your deployed SPA origin in production (used in chat listing links).
  frontend-base-url: "http://localhost:5173"
  jwt:
    secret: "change-this-to-a-long-random-secret-key-for-production-use-only"
    expiration-ms: 86400000
  upload-dir: ${user.dir}/uploads
  public-base-url: http://localhost:8080
  gemini:
    enabled: true
    api-key: "AIzaSyBHLb7jWLxTC1S9OJm-xkwla7GR-7lLbVw"
    # Use model IDs that match non-zero limits in AI Studio (many accounts show 0/0 for gemini-2.0-flash).
    # Primary: Gemini 2.5 Flash — fallback: 3.1 Flash Lite (higher RPD on free tier).
    model: gemini-2.5-flash
    fallback-model: gemini-3.1-flash-lite
    # If both models 404, list IDs: GET https://generativelanguage.googleapis.com/v1beta/models?key=YOUR_KEY
    # While debugging: true = listings still work if the API errors. Set false when Cat-Check is stable.
    fail-open-on-api-error: true

springdoc:
  swagger-ui:
    path: /swagger

logging:
  level:
    org.springframework.security: INFO
