spring:
  application:
    name: pawhub-api
  datasource:
    url: jdbc:mysql://localhost:3306/pawhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: smab
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

pawhub:
  jwt:
    secret: "change-this-to-a-long-random-secret-key-for-production-use-only"
    expiration-ms: 86400000
  upload-dir: ${user.dir}/uploads
  public-base-url: http://localhost:8080

springdoc:
  swagger-ui:
    path: /swagger

logging:
  level:
    org.springframework.security: INFO
